<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 | Ficha e Tabela</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.2/css/flag-icons.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen" class="login-overlay">
    <div class="login-card">
        <h1 class="logo-text" style="font-size: 2.5rem; text-align: center; margin-bottom: 5px;">BOLÃO<span>26</span></h1>
        <p style="text-align: center; color: #666; margin-bottom: 25px;">Acesse para lançar seus palpites</p>
        
        <label>Seu Nome:</label>
        <input type="text" id="login-name" class="input-field" placeholder="Ex: Artur">
        
        <label style="margin-top: 15px;">PIN de Acesso (4 dígitos):</label>
        <input type="password" id="login-pin" class="input-field" placeholder="****" maxlength="4" inputmode="numeric">
        
        <button class="btn-float-save" style="position: static; width: 100%; margin-top: 25px; transform: none; padding: 15px;" onclick="realizarLogin()">ENTRAR NO BOLÃO</button>
        <p id="login-error" style="color: red; text-align: center; margin-top: 15px; display: none; font-weight: 600;">Dados incorretos!</p>
    </div>
</div>

<div id="main-app" style="display: none;">
    <header class="ge-header">
        <div class="logo-text">BOLÃO<span>26</span></div>
        <div style="font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 10px;">
            <i class="ph-bold ph-user-circle" style="font-size: 1.5rem; color: var(--br-yellow);"></i>
            <span id="display-user-name">Usuário</span>
            <button onclick="fazerLogout()" style="background: none; border: none; color: white; text-decoration: underline; cursor: pointer;">Sair</button>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('palpites')">Palpites</button>
        <button class="tab-btn" onclick="switchTab('ranking')">Classificação</button>
        <button class="tab-btn" onclick="switchTab('admin')" style="display: none;">Gabarito (Admin)</button>
    </nav>

    <div class="app-content">
        <section id="view-palpites" class="view active">
            <div id="lock-warning" style="display: none; background: #e0f2fe; color: #0369a1; padding: 15px; border-radius: 6px; margin-bottom: 20px; text-align: center; font-weight: 600; border: 1px solid #bae6fd;">
                <i class="ph-fill ph-lock-key"></i> Seus palpites já foram enviados e estão bloqueados. Boa sorte!
            </div>
            
            <div id="mobile-slip-container"></div>
            
            <button id="btn-save-palpites" class="btn-float-save" onclick="salvarNoMongo()"><i class="ph-fill ph-cloud-arrow-up"></i> Salvar Definitivamente</button>
        </section>

        <section id="view-ranking" class="view">
            <div class="table-wrapper">
                <table class="ge-table">
                    <thead>
                        <tr>
                            <th colspan="2" style="text-align: left; padding-left: 15px;">CLASSIFICAÇÃO</th>
                            <th title="Pontos">P</th>
                            <th title="Jogos">J</th>
                            <th title="Vitórias">V</th>
                            <th title="Empates">E</th>
                            <th title="Derrotas">D</th>
                            <th title="Aproveitamento">%</th>
                            <th title="Últimos Jogos">ÚLT. JOGOS</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body-app">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="view-admin" class="view">
            <div class="admin-warning">
                <strong>Área do Organizador:</strong> Lance aqui os placares reais da Copa. A classificação será atualizada para todos.
            </div>
            <div id="admin-slip-container"></div>
            <button class="btn-float-save" style="background: var(--ge-blue);" onclick="saveAdminResults()"><i class="ph-fill ph-upload-simple"></i> Publicar Gabarito</button>
        </section>
    </div>
</div>

<div id="toast-notif" class="toast-notif"></div>
<div id="loading-spinner" class="loading-overlay" style="display: none;">
    <div class="spinner"></div>
</div>

<script src="script.js"></script>
</body>
</html>
